<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
    <style>
        :root, [data-theme='light'] {
            --page-bg: #f0f4f8;
            --card-bg: #e8f4fd;
            --card-border: #b0b8c1;
            --text-primary: #103B1B;
            --text-secondary: #024A47;
            --input-bg: #ffffff;
            --input-border: #ccc;
            --h1-color: #103B1B;
        }
        [data-theme='dark'] {
            --page-bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --input-bg: #21262d;
            --input-border: #30363d;
            --h1-color: #c9d1d9;
        }
        body {
            background-color: var(--page-bg);
            transition: background-color 0.3s ease;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar {
            display: none;
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
